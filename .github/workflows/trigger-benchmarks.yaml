name: trigger-benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger agent-sandbox-benchmarks
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.BENCHMARKS_DISPATCH_TOKEN }}
          repository: actordock/agent-sandbox-benchmarks
          event-type: actordock-updated
          client-payload: >-
            {"ref":"${{ github.ref_name }}","sha":"${{ github.sha }}"}
