apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform
  namespace: {{ include "actordock-stack.namespace" . }}
  labels:
    {{- include "actordock-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-actortemplate-reader
  namespace: {{ include "actordock-stack.namespace" . }}
  labels:
    {{- include "actordock-stack.labels" . | nindent 4 }}
rules:
  - apiGroups: ["ate.dev"]
    resources: ["actortemplates"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-actortemplate-reader
  namespace: {{ include "actordock-stack.namespace" . }}
  labels:
    {{- include "actordock-stack.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: platform
    namespace: {{ include "actordock-stack.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: platform-actortemplate-reader
