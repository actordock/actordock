apiVersion: v1
kind: Namespace
metadata:
  name: runtime-podcert-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: podcert-runtime-dev-signer
rules:
# The service signer needs to be able to read services and pods.
- apiGroups:
  - ""
  resources:
  - services
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - certificates.k8s.io
  resources:
  - podcertificaterequests
  verbs:
  - get
  - list
  - watch
  - update
- apiGroups:
  - certificates.k8s.io
  resources:
  - clustertrustbundles
  verbs:
  - create
  - get
  - list
  - watch
  - update
  - delete
- apiGroups:
  - certificates.k8s.io
  resources:
  - podcertificaterequests/status
  verbs:
  - update
- apiGroups:
  - certificates.k8s.io
  resources:
  - signers
  resourceNames:
  - servicedns.podcert.actordock.dev/*
  - podidentity.podcert.actordock.dev/*
  verbs:
  - sign
  - attest
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: podcert-runtime-dev-signer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: podcert-runtime-dev-signer
subjects:
- kind: ServiceAccount
  namespace: runtime-podcert-system
  name: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: runtime-podcert-system
  name: coordinator
rules:
- apiGroups:
  - "coordination.k8s.io"
  resources:
  - "leases"
  verbs:
  - create
  - get
  - list
  - watch
  - update
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runtime-podcert-is-a-coordinator
  namespace: runtime-podcert-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: coordinator
subjects:
- kind: ServiceAccount
  namespace: runtime-podcert-system
  name: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-podcert
  namespace: runtime-podcert-system
  labels:
    app: runtime-podcert
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runtime-podcert
  template:
    metadata:
      labels:
        app: runtime-podcert
    spec:
      containers:
      - name: controller
        image: ko://github.com/actordock/runtime/cmd/runtime-podcert
        args:
        - --in-cluster=true
        - --sharding-pod-namespace=$(POD_NAMESPACE)
        - --sharding-pod-name=$(POD_NAME)
        - --sharding-pod-uid=$(POD_UID)
        - --sharding-application-name=runtime-podcert
        - --service-dns-ca-pool=/run/ca-state/service-dns-pool.json
        - --pod-identity-ca-pool=/run/ca-state/pod-identity-pool.json
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        volumeMounts:
        - name: "ca-state"
          mountPath: "/run/ca-state"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - NET_BIND_SERVICE
            drop:
            - ALL
          readOnlyRootFilesystem: true
      volumes:
      - name: "ca-state"
        projected:
          sources:
          - secret:
              name: "service-dns-ca-pool"
              items:
              - key: "pool"
                path: "service-dns-pool.json"
          - secret:
              name: "pod-identity-ca-pool"
              items:
              - key: "pool"
                path: "pod-identity-pool.json"
      dnsPolicy: Default
      nodeSelector:
        kubernetes.io/os: linux
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
