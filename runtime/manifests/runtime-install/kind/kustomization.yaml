apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../runtime-api.yaml
  - ../runtime-controller.yaml
  - ./runtime-worker
  - ../runtime-net-dns.yaml
  - ../runtime-net-router.yaml
  - ../valkey.yaml
  - ../runtime-podcert.yaml
  - rustfs.yaml
  - ./otel-collector.yaml
  - ./prometheus.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: runtime-api
        namespace: actordock-system
      spec:
        template:
          spec:
            containers:
            - name: runtime-api
              env:
              - name: OTEL_EXPORTER_OTLP_ENDPOINT
                value: http://opentelemetry-collector.otel-system.svc:4317
  - patch: |-
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: runtime-worker
        namespace: actordock-system
      spec:
        template:
          spec:
            containers:
            - name: runtime-worker
              env:
              - name: OTEL_EXPORTER_OTLP_ENDPOINT
                value: http://opentelemetry-collector.otel-system.svc:4317

