apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform
  namespace: actordock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform
  template:
    metadata:
      labels:
        app: platform
    spec:
      containers:
        - name: platform
          image: ko://github.com/actordock/actordock/cmd/platform
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PLATFORM_LISTEN_ADDR
              value: ":8080"
            - name: ACTORDOCK_API_KEY
              value: "dev"
            - name: ACTORDOCK_ATEAPI_ADDR
              value: "api.ate-system.svc:443"
            - name: ACTORDOCK_DOMAIN
              value: "localhost"
            - name: ACTORDOCK_TEMPLATE_NAMESPACE
              value: "actordock"
            - name: ACTORDOCK_TEMPLATE_NAME
              value: "base"
            - name: ACTORDOCK_ENVD_VERSION
              value: "0.1.0"
            - name: ACTORDOCK_REDIS_ADDR
              value: "redis.actordock.svc:6379"
            - name: ACTORDOCK_DEFAULT_SANDBOX_TIMEOUT
              value: "300"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: platform
  namespace: actordock
spec:
  selector:
    app: platform
  ports:
    - name: http
      port: 8080
      targetPort: http
