apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform
  namespace: actordock
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-actortemplate-reader
  namespace: actordock
rules:
  - apiGroups: ["ate.dev"]
    resources: ["actortemplates"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-actortemplate-reader
  namespace: actordock
subjects:
  - kind: ServiceAccount
    name: platform
    namespace: actordock
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: platform-actortemplate-reader
