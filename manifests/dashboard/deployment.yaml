apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: actordock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: ko://github.com/actordock/actordock/dashboard/cmd/dashboard
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: ACTORDOCK_DASHBOARD_ADDR
              value: ":3000"
            - name: ACTORDOCK_PLATFORM_URL
              value: "http://platform:8080"
            - name: ACTORDOCK_ROUTER_URL
              value: "http://router:8081"
            - name: ACTORDOCK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dashboard-api-key
                  key: ACTORDOCK_API_KEY
            - name: ACTORDOCK_DASHBOARD_PROXY_PLATFORM
              value: "true"
            - name: ACTORDOCK_DASHBOARD_PROXY_ROUTER
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: actordock
spec:
  selector:
    app: dashboard
  ports:
    - name: http
      port: 3000
      targetPort: http
