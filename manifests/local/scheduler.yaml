apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: actordock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: ko://github.com/actordock/actordock/cmd/scheduler
          env:
            - name: SCHEDULER_LOG_LEVEL
              value: "info"
            - name: SCHEDULER_REDIS_ADDR
              value: "redis.actordock.svc:6379"
            - name: SCHEDULER_RUNTIME_API_ADDR
              value: "api.actordock-system.svc:443"
            - name: SCHEDULER_POLL_INTERVAL
              value: "5s"
