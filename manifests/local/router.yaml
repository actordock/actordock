apiVersion: apps/v1
kind: Deployment
metadata:
  name: router
  namespace: actordock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
    spec:
      containers:
        - name: router
          image: ko://github.com/actordock/actordock/cmd/router
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: ROUTER_LISTEN_ADDR
              value: ":8081"
            - name: ACTORDOCK_RUNTIME_API_ADDR
              value: "api.actordock-system.svc:443"
            - name: ACTORDOCK_DOMAIN
              value: "localhost"
            - name: ACTORDOCK_ENVD_PORT
              value: "80"
            - name: ACTORDOCK_REDIS_ADDR
              value: "redis.actordock.svc:6379"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: router
  namespace: actordock
spec:
  selector:
    app: router
  ports:
    - name: http
      port: 8081
      targetPort: http
