name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting (gofmt)
        run: make verify-fmt

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/web/package-lock.json

      - name: Verify dashboard
        run: make verify-dashboard

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Verify Helm chart
        run: make verify-helm

      - name: Build binaries
        run: make build

  e2e:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/web/package-lock.json

      - name: Install Kind cluster + runtime + Actordock
        run: ./hack/install-local.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: E2E verify (E2B SDK)
        run: ./hack/verify-local.sh

      - name: Example E2E (agent frameworks)
        run: ./hack/verify-examples.sh
