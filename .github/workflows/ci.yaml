name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting (gofmt)
        run: make verify-fmt

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Build binaries
        run: make build

  e2e:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Kind cluster + Substrate + Actordock
        run: ./hack/install-local.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: E2E verify (E2B SDK)
        run: ./hack/verify-local.sh
