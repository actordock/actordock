{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "actordock-stack.apiKeySecretName" . }}
  namespace: {{ include "actordock-stack.namespace" . }}
  labels:
    {{- include "actordock-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  ACTORDOCK_API_KEY: {{ .Values.secrets.apiKey | quote }}
{{- end }}
